on:
  push:
    branches: [ main ]
env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/flask-k8s-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build & push
        run: |
          docker build -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: echo ${{ secrets.KUBECONFIG }} | base64 -d > kube.yaml
      - name: Deploy
        run: |
          kubectl set image deployment/flask-app flask=$IMAGE:${{ github.sha }} --kubeconfig=kube.yaml
          kubectl rollout status deployment/flask-app --kubeconfig=kube.yaml
